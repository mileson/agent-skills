# 图床配置模板
# 使用方法：复制此文件为 my_hosts.yaml 并填写你的配置，或将敏感字段存入 secrets-vault 的 aliyun_oss 命名空间。

active_provider: aliyun_oss

aliyun_oss:
  # === 必填配置 ===
  access_key_id: "your-access-key-id"             # 推荐放到 secrets-vault 中，避免提交到 Git
  access_key_secret: "your-access-key-secret"     # 推荐放到 secrets-vault 中，避免提交到 Git
  bucket: "mileson-documents"                     # 格式如：my-blog-images
  region: "cn-hangzhou"                           # 应为 cn-hangzhou，不是 oss-cn-hangzhou
  endpoint: "oss-cn-hangzhou.aliyuncs.com"       # 对应的 Endpoint

  # === 可选配置 ===
  use_ssl: true
  cdn_domain: ""
  base_path: "markdown-images"

  path_strategy: article_name                      # article_name | date_based | flat
  filename_strategy: keep_original                # keep_original | hash | uuid
  conflict_strategy: skip                         # skip | overwrite | rename

qiniu:
  enabled: false
  access_key: ""
  secret_key: ""
  bucket: ""
  domain: ""
  path: ""

tencent_cos:
  enabled: false
  secret_id: ""
  secret_key: ""
  bucket: ""
  region: ""
  domain: ""

github:
  enabled: false
  repo: ""
  token: ""
  branch: main
  path: images

custom:
  enabled: false
  upload_url: ""
  api_key: ""
  method: POST
  field_name: file
